<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frutas y Legumbres</title>
  <meta name="description"
    content="Proycto para un punto de venta de frutas y legumbres, con gestión de inventario, ventas e historial. Desarrollado con HTML, CSS y JavaScript.">
  <meta name="author" content="Luis Francisco Matlalcuatzi Gonzalez.">
  <meta name="keywords"
    content="frutas, legumbres, venta, inventario, punto de venta, POS, gestión de ventas, historial de ventas, dashboard, JavaScript, HTML, CSS">
  <meta name="theme-color" content="#2e7d32">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="/src/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./src/css/bootstrap/bootstrap.min.css">
  <script src="./src/js/bootstrap/bootstrap.bundle.min.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg bg-success-subtle border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-semibold text-success" href="./index.html">Frutas y Legumbres</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
        aria-controls="mainNavbar" aria-expanded="false" aria-label="Abrir navegacion">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="./index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="./src/content/inventario.html">Inventario</a></li>
          <li class="nav-item"><a class="nav-link" href="./src/content/ventas.html">Ventas</a></li>
          <li class="nav-item"><a class="nav-link" href="./src/content/historial.html">Historial</a></li>
          <li class="nav-item"><a class="nav-link" href="./src/content/reporte.html">Reportes</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4 flex-grow-1">
    <div class="row g-3">
      <div class="col-12 col-xl-7">
        <div class="card shadow-sm h-100">
          <div class="card-body d-flex flex-column">
            <h2 class="h4 mb-3">Caja</h2>
            <input type="text" id="buscador-caja" class="form-control mb-3" placeholder="Buscar producto..."
              onkeyup="filtrarProductos()">
            <div id="grid-productos" class="row row-cols-3 g-2 overflow-auto grid-compact" style="max-height: 248px;">
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-xl-5">
        <div class="card shadow-sm h-100">
          <div class="card-body d-flex flex-column">
            <h2 class="h4 mb-3">Ticket Actual</h2>

            <p id="producto-seleccionado-txt" class="text-secondary mb-2">Selecciona un producto...</p>
            <input type="hidden" id="id-seleccionado">

            <input type="number" inputmode="decimal" id="cantidad-venta" class="form-control mb-2"
              placeholder="Cantidad" step="0.01">

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="forzar-promo" checked>
              <label class="form-check-label" for="forzar-promo">Aplicar promocion (si cumple)</label>
            </div>

            <button class="btn btn-success mb-3" onclick="agregarACuenta()">Agregar al Ticket</button>

            <div class="table-responsive mb-3">
              <table class="table table-striped align-middle mb-0">
                <thead>
                  <tr>
                    <th>Prod</th>
                    <th>Cant</th>
                    <th>Sub</th>
                    <th>X</th>
                  </tr>
                </thead>
                <tbody id="tabla-cuenta"></tbody>
              </table>
            </div>

            <div class="border rounded p-3 mb-3 bg-light">
              <div class="fw-semibold mb-2">Total: $<span id="total-cuenta">0.00</span></div>
              <div class="input-group mb-2">
                <span class="input-group-text">Pago $</span>
                <input type="number" inputmode="decimal" id="pago-cliente" class="form-control" placeholder="0.00"
                  oninput="calcularCambio()">
              </div>
              <div class="fw-semibold">Cambio: $<span id="cambio-cliente">0.00</span></div>
            </div>

            <button class="btn btn-danger mb-2" onclick="terminarVenta()">Cobrar y Registrar Venta</button>
            <button class="btn btn-warning" onclick="limpiarCuenta()">Limpiar Ticket (Sin cobrar)</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-light text-center py-1 mt-auto border-top">
    <div class="container">
      <span class="text-muted">Frutas y Legumbres. Por Luis Francisco Matlalcuatzi Gonzalez.</span>
    </div>
  </footer>

  <script src="./src/js/core/utils.js"></script>
  <script src="./src/js/services/storage.service.js"></script>
  <script src="./src/js/services/image.service.js"></script>
  <script src="./src/js/services/promotion.engine.js"></script>
  <script src="./src/js/app/fruteria.app.js"></script>
  <script src="./src/js/main.js"></script>
</body>

</html>
